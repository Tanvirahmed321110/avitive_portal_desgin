<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Portal Login</title>
        <link rel="stylesheet" href="/css/main.css">
        <link rel="stylesheet" href="/css/login.css">
    </head>

    <body>

        <div class="login-container">
            <div class="login-image-section">
                <div class="img-wrap">
                    <img src="https://img.freepik.com/free-vector/tablet-login-concept-illustration_114360-7863.jpg"
                    alt="Login UI Image">
                </div>
                <h3 class="welcome-title">Welcome Back Portal</h3>
                <p style="font-size: 13px; margin-top: 10px; opacity: 0.75;">Manage your investments, purchases, and
                    rewards securely.</p>
            </div>

            <div class="login-form-section">
                <div class="login-header">
                    <h2>Account Login</h2>
                    <p>Please enter your credentials to access your dashboard.</p>
                </div>

                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="input-wrapper">
                            <input type="tel" id="phone" placeholder="e.g. 017XXXXXXXX" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="text" id="password" placeholder="••••••••" required="">
                            <span class="toggle-password" id="togglePasswordBtn" style="opacity: 0.6;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path id="eyePath" stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path id="eyeBody" stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                    </path>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="./reset.html" class="forgot-pass">Reset Password?</a>
                    </div>

                    <a href="/customer/customer_dashboard.html" type="submit" class="login-btn text-center">Sign In</a>
                </form>
            </div>
        </div>

        <script>
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const eyePath = document.getElementById('eyePath');

            togglePasswordBtn.addEventListener('click', function () {
                // Toggle the type attribute
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                // Change Icon Style dynamically on toggle
                if (type === 'text') {
                    // Striking through or modifying eye path to show "Hidden state"
                    togglePasswordBtn.style.opacity = "0.6";
                } else {
                    togglePasswordBtn.style.opacity = "1";
                }
            });
        </script>

    </body>

</html>
