<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password - Portal</title>
        <link rel="stylesheet" href="/css/main.css">
        <link rel="stylesheet" href="/css/login.css">
    </head>

    <body>

        <div class="login-container">
            <div class="login-image-section reset-section">
                <div class="img-wrap">
                    <img src="https://img.freepik.com/free-vector/forgot-password-concept-illustration_114360-1123.jpg"
                        alt="Reset Password UI Vector">
                </div>
                <h3 class="welcome-title">Secure Recovery</h3>
                <p style="font-size: 13px; margin-top: 10px; opacity: 0.75;">Don't worry, we will help you get back into your security system.</p>
            </div>

            <div class="login-form-section">
                <div class="login-header">
                    <h2>Reset Password</h2>
                    <p>Enter your registered phone number below. We will send an OTP code to verify identity.</p>
                </div>

                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="recovery-phone">Registered Phone Number</label>
                        <div class="input-wrapper">
                            <input type="tel" id="recovery-phone" placeholder="e.g. 017XXXXXXXX" required>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">Send Reset Link / OTP</button>

                    <a href="./login.html" class="back-to-login">Remembered Password? <strong>Sign In</strong></a>
                </form>
            </div>
        </div>

    </body>

</html>
