<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-page">

    <div class="login-left">
        <div class="login-card">

            <div class="login-logo">
                P
            </div>

            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">
                Login to your customer portal using your phone number and password.
            </p>

            <form action="/portal/login" method="post">

                <div class="login-form-group">
                    <label>Phone Number</label>
                    <div class="login-input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.86 19.86 0 0 1 3.08 5.18 2 2 0 0 1 5.06 3h3a2 2 0 0 1 2 1.72c.12.9.33 1.77.62 2.6a2 2 0 0 1-.45 2.11L9 10.66a16 16 0 0 0 4.34 4.34l1.23-1.23a2 2 0 0 1 2.11-.45c.83.29 1.7.5 2.6.62A2 2 0 0 1 22 16.92z"/>
                        </svg>
                        <input type="tel" name="phone" placeholder="01XXXXXXXXX" required />
                    </div>
                </div>

                <div class="login-form-group">
                    <label>Password</label>
                    <div class="login-input-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" name="password" placeholder="Enter password" required />
                    </div>
                </div>

                <div class="login-actions">
                    <label class="login-remember">
                        <input type="checkbox" />
                        Remember me
                    </label>

                    <a href="/reset-password" class="login-reset">
                        Reset Password?
                    </a>
                </div>

                <button type="submit" class="login-submit">
                    Login
                </button>

            </form>

        </div>
    </div>

    <div class="login-right">
        <div class="login-image-card">
            <img src="/your_module/static/src/img/login-portal.jpg" alt="Portal Login" />

            <h2>Manage your rewards, purchases and withdrawals easily.</h2>
            <p>
                View your purchase history, track rewards, request monthly withdrawals,
                and receive SMS notifications from one modern portal.
            </p>
        </div>
    </div>

</div>
</body>
</html>
